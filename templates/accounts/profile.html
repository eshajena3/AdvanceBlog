{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<h2>My Profile</h2>

<img
    src="{{ user.profile.image.url }}"
    width="150"
    class="rounded-circle"
>

<form
    method="POST"
    enctype="multipart/form-data"
>

    {% csrf_token %}

    {{ u_form.as_p }}
    {{ p_form.as_p }}

    <button class="btn btn-primary">
        Update Profile
    </button>

</form>

{% endblock %}
